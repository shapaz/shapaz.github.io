<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחשבון פיצוי חוק המכר - מפורט</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #f1f5f9; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); padding: 1.5rem; margin-bottom: 1rem; border: 1px solid #e2e8f0; }
        input { border: 1px solid #cbd5e1; padding: 0.5rem; border-radius: 8px; width: 100%; font-size: 14px; background: #fff; }
        .milestone-card { border-right: 4px solid #3b82f6; background: #ffffff; padding: 1rem; border-radius: 12px; margin-bottom: 0.75rem; border: 1px solid #e2e8f0; }
        .summary-pill { background: #1e293b; color: white; padding: 1.5rem; border-radius: 20px; position: sticky; bottom: 1rem; z-index: 50; }
    </style>
</head>
<body class="p-4 pb-40">
    <div class="max-w-2xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-slate-900">מחשבון פיצוי שכנים</h1>
            <p class="text-slate-500 font-medium">פירוט מלא של הצמדות והחזרים לכל תשלום</p>
        </header>

        <div class="card">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="col-span-2">
                    <label class="block text-xs font-bold text-slate-500 mb-1">מחיר הדירה (₪)</label>
                    <input type="number" id="totalPrice" value="2500000" oninput="updateAll()">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 text-blue-600">מסירה חוזית</label>
                    <input type="date" id="contractDelivery" oninput="updateAll()">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">מסירה בפועל</label>
                    <input type="date" id="actualDelivery" oninput="updateAll()">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">שכירות חודשית (₪)</label>
                    <input type="number" id="rent" value="6500" oninput="updateAll()">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">חתימת חוזה</label>
                    <input type="date" id="signDate" oninput="updateAll()">
                </div>
            </div>
            <div id="lawBadge" class="mt-4 text-center py-1.5 rounded-full text-xs font-bold"></div>
        </div>

        <div class="mb-4 flex justify-between items-end">
            <h2 class="text-xl font-bold text-slate-800">פירוט תשלומים</h2>
            <button onclick="addCustomRow()" class="text-blue-600 text-sm font-bold">+ הוסף תשלום</button>
        </div>
        
        <div id="milestoneList" class="space-y-3"></div>

        <div class="flex justify-center mt-4">
            <button onclick="resetMilestones()" class="text-slate-400 text-xs underline">איפוס ללוח ברירת מחדל</button>
        </div>

        <div class="summary-pill shadow-2xl">
            <div class="grid grid-cols-1 gap-2 text-sm mb-4">
                <div class="flex justify-between opacity-80"><span>פיצוי שכ"ד:</span><span id="resComp">₪0</span></div>
                <div class="flex justify-between opacity-80"><span>החזר הצמדה (60% + איחור):</span><span id="resLinkTotal">₪0</span></div>
                <div class="flex justify-between text-xl font-black text-yellow-400 border-t border-slate-700 pt-2">
                    <span>סה"כ תביעה:</span><span id="resTotal">₪0</span>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="shareWhatsApp()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition-all">שיתוף בוואטסאפ</button>
                <button onclick="clearStorage()" class="bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-xl transition-all text-xs">איפוס נתונים</button>
            </div>
        </div>
    </div>

    <script>
        const indexData = {
            "2021-01": 115.1, "2021-02": 115.2, "2021-03": 115.7, "2021-04": 116.6, "2021-05": 117.5, "2021-06": 118.0, "2021-07": 118.5, "2021-08": 119.1, "2021-09": 119.2, "2021-10": 119.5, "2021-11": 119.7, "2021-12": 119.8,
            "2022-01": 120.9, "2022-02": 121.4, "2022-03": 122.9, "2022-04": 124.4, "2022-05": 125.1, "2022-06": 126.0, "2022-07": 126.8, "2022-08": 127.4, "2022-09": 127.4, "2022-10": 127.8, "2022-11": 127.5, "2022-12": 127.5,
            "2023-01": 128.8, "2023-02": 129.2, "2023-03": 129.2, "2023-04": 129.6, "2023-05": 130.1, "2023-06": 130.5, "2023-07": 130.5, "2023-08": 131.0, "2023-09": 131.0, "2023-10": 131.3, "2023-11": 131.4, "2023-12": 131.5,
            "2024-01": 131.8, "2024-02": 132.0, "2024-03": 132.3, "2024-04": 133.0, "2024-05": 133.5, "2024-06": 133.6, "2024-07": 133.8, "2024-08": 134.1, "2024-09": 134.1, "2024-10": 134.2, "2024-11": 134.4, "2024-12": 134.6,
            "2025-01": 134.9, "2025-02": 135.2, "2025-03": 135.5, "2025-04": 136.0, "2025-05": 136.4, "2025-06": 136.6, "2025-07": 136.8, "2025-08": 137.0, "2025-09": 137.2, "2025-10": 137.4, "2025-11": 137.6, "2025-12": 137.8
        };

        const defaultMilestones = [
            { name: "מקדמה", pct: 0, amt: 10000 },
            { name: "חתימת חוזה", pct: 0, amt: 0 }, // Will be set to 7% - 10k in init
            { name: "גמר יציקת רצפה", pct: 24, amt: 0 },
            { name: "גמר שלד קומה", pct: 25, amt: 0 },
            { name: "גמר שלד בניין", pct: 5, amt: 0 },
            { name: "גמר ציפוי חוץ", pct: 6, amt: 0 },
            { name: "גמר טיח וריצוף", pct: 10, amt: 0 },
            { name: "גמר חלונות ודלתות", pct: 13, amt: 0 },
            { name: "גמר מערכות ופיתוח", pct: 5, amt: 0 },
            { name: "אישור אכלוס (טופס 4)", pct: 5, amt: 0 }
        ];

        function init() {
            const saved = localStorage.getItem('neighborData_v2');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('totalPrice').value = data.totalPrice;
                document.getElementById('rent').value = data.rent;
                document.getElementById('signDate').value = data.signDate;
                document.getElementById('contractDelivery').value = data.contractDelivery;
                document.getElementById('actualDelivery').value = data.actualDelivery;
                renderMilestones(data.milestones);
            } else {
                const price = 2500000;
                defaultMilestones[1].amt = (price * 0.07) - 10000;
                renderMilestones(defaultMilestones);
            }
            updateAll();
        }

        function renderMilestones(list) {
            const container = document.getElementById('milestoneList');
            container.innerHTML = '';
            list.forEach((m, i) => addRowUI(m));
        }

        function addRowUI(data) {
            const container = document.getElementById('milestoneList');
            const row = document.createElement('div');
            row.className = 'milestone-card';
            row.innerHTML = `
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <input type="text" value="${data.name}" class="m-name font-bold text-slate-800 border-none p-0 focus:ring-0">
                    <input type="date" value="${data.date || ''}" class="m-date text-xs font-bold text-blue-600 text-left border-none p-0" oninput="updateAll()">
                </div>
                <div class="grid grid-cols-2 gap-4 items-center">
                    <div class="flex items-center gap-2">
                        <input type="number" value="${data.pct}" class="m-pct w-16 text-center font-bold text-slate-600" oninput="syncFromPct(this)">
                        <span class="text-xs text-slate-400">%</span>
                        <input type="number" value="${data.amt}" class="m-amt font-bold" oninput="syncFromAmt(this)">
                        <span class="text-xs text-slate-400">₪</span>
                    </div>
                    <div class="text-left">
                         <button onclick="this.closest('.milestone-card').remove();updateAll()" class="text-red-300 hover:text-red-500 text-xs italic">מחיקה</button>
                    </div>
                </div>
                <div class="mt-3 pt-2 border-t border-slate-100 flex justify-between items-center text-[11px]">
                    <div class="text-slate-500">הצמדה: <span class="m-link-paid font-bold text-slate-700">₪0</span></div>
                    <div class="text-emerald-600 font-bold italic underline">החזר: <span class="m-refund-sum">₪0</span></div>
                </div>
            `;
            container.appendChild(row);
        }

        function syncFromPct(el) {
            const price = parseFloat(document.getElementById('totalPrice').value) || 0;
            const amtInput = el.closest('.milestone-card').querySelector('.m-amt');
            amtInput.value = Math.round(price * (el.value / 100));
            updateAll();
        }

        function syncFromAmt(el) {
            const price = parseFloat(document.getElementById('totalPrice').value) || 0;
            const pctInput = el.closest('.milestone-card').querySelector('.m-pct');
            pctInput.value = ((el.value / price) * 100).toFixed(2);
            updateAll();
        }

        function addCustomRow() {
            addRowUI({ name: "שלב חדש", pct: 0, amt: 0 });
            updateAll();
        }

        function getIndex(date) {
            if (!date) return 0;
            const d = new Date(date);
            const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
            return indexData[key] || 137.8;
        }

        function updateAll() {
            const signDate = new Date(document.getElementById('signDate').value);
            const contractDeliv = new Date(document.getElementById('contractDelivery').value);
            const actualDeliv = new Date(document.getElementById('actualDelivery').value);
            const price = parseFloat(document.getElementById('totalPrice').value) || 0;
            const rent = parseFloat(document.getElementById('rent').value) || 0;
            const isNewLaw = signDate >= new Date('2022-07-07');

            const badge = document.getElementById('lawBadge');
            badge.innerText = isNewLaw ? "חוק חדש (תיקון 9) חל עליך" : "חוק ישן חל עליך";
            badge.className = isNewLaw ? "mt-4 text-center py-1.5 rounded-full text-xs font-bold bg-emerald-100 text-emerald-700" : "mt-4 text-center py-1.5 rounded-full text-xs font-bold bg-slate-200 text-slate-700";

            // Rent Comp
            let rentComp = 0;
            const diffDays = (actualDeliv - contractDeliv) / (1000 * 60 * 60 * 24);
            const mTotal = diffDays / 30.44;
            if (isNewLaw && diffDays > 30) {
                for (let m = 2; m <= mTotal + 1; m++) {
                    if (m <= 4) rentComp += rent; else if (m <= 10) rentComp += rent * 1.25; else rentComp += rent * 1.5;
                }
            } else if (!isNewLaw && diffDays > 60) {
                for (let m = 1; m <= mTotal; m++) {
                    if (m <= 8) rentComp += rent * 1.5; else rentComp += rent * 1.25;
                }
            }

            // Linkage & Refunds
            let totalLinkRefund = 0;
            const baseIdx = getIndex(signDate);
            const delivIdx = getIndex(contractDeliv);
            const milestones = [];

            document.querySelectorAll('.milestone-card').forEach(card => {
                const name = card.querySelector('.m-name').value;
                const pct = card.querySelector('.m-pct').value;
                const amt = parseFloat(card.querySelector('.m-amt').value) || 0;
                const dateVal = card.querySelector('.m-date').value;
                const payDate = new Date(dateVal);
                
                milestones.push({ name, pct, amt, date: dateVal });

                if (dateVal && baseIdx > 0) {
                    const currentIdx = getIndex(dateVal);
                    const linkPaid = amt * (currentIdx / baseIdx - 1);
                    card.querySelector('.m-link-paid').innerText = '₪' + Math.max(0, Math.round(linkPaid)).toLocaleString();

                    let refund = 0;
                    if (isNewLaw) {
                        if (payDate <= contractDeliv) {
                            refund = linkPaid * 0.6;
                        } else {
                            const linkAtDeliv = amt * (delivIdx / baseIdx - 1);
                            refund = (linkAtDeliv * 0.6) + (linkPaid - linkAtDeliv);
                        }
                    } else if (payDate > contractDeliv) {
                        const linkAtDeliv = amt * (delivIdx / baseIdx - 1);
                        refund = linkPaid - linkAtDeliv;
                    }
                    
                    card.querySelector('.m-refund-sum').innerText = '₪' + Math.max(0, Math.round(refund)).toLocaleString();
                    totalLinkRefund += Math.max(0, refund);
                }
            });

            document.getElementById('resComp').innerText = '₪' + Math.round(rentComp).toLocaleString();
            document.getElementById('resLinkTotal').innerText = '₪' + Math.round(totalLinkRefund).toLocaleString();
            document.getElementById('resTotal').innerText = '₪' + Math.round(rentComp + totalLinkRefund).toLocaleString();

            localStorage.setItem('neighborData_v2', JSON.stringify({
                totalPrice: price, rent, signDate: document.getElementById('signDate').value,
                contractDelivery: document.getElementById('contractDelivery').value,
                actualDelivery: document.getElementById('actualDelivery').value,
                milestones
            }));
        }

        function resetMilestones() { localStorage.removeItem('neighborData_v2'); location.reload(); }
        function clearStorage() { if(confirm("למחוק הכל?")) { localStorage.removeItem('neighborData_v2'); location.reload(); } }
        function shareWhatsApp() {
            const msg = `*סיכום תביעת דייר*\n🏘️ פיצוי שכ"ד: ${document.getElementById('resComp').innerText}\n📉 החזר הצמדות: ${document.getElementById('resLinkTotal').innerText}\n*💰 סה"כ דרישה: ${document.getElementById('resTotal').innerText}*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
        }

        init();
    </script>
</body>
</html>
