<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחשבון פיצוי חוק המכר - קבוצת דיירים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #f8fafc; }
        .card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; padding: 1.5rem; margin-bottom: 1rem; }
        input { border: 1px solid #cbd5e1; padding: 0.4rem; border-radius: 6px; width: 100%; font-size: 14px; }
        .milestone-row { display: grid; grid-template-cols: 2fr 1fr 1.5fr 0.5fr; gap: 8px; align-items: center; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
    </style>
</head>
<body class="p-4 pb-32">
    <div class="max-w-2xl mx-auto">
        <header class="text-center mb-6">
            <h1 class="text-2xl font-bold text-slate-800">מחשבון פיצוי והצמדות - מותאם אישית</h1>
            <p class="text-slate-500 text-sm italic">הנתונים נשמרים מקומית בדפדפן שלך</p>
        </header>

        <div class="card shadow-sm">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="col-span-2">
                    <label class="block text-xs font-bold text-slate-500 mb-1">מחיר הדירה (₪)</label>
                    <input type="number" id="totalPrice" value="2500000" oninput="updateAll()">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">שכירות חודשית (₪)</label>
                    <input type="number" id="rent" value="6500" oninput="updateAll()">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">תאריך חתימה</label>
                    <input type="date" id="signDate" oninput="updateAll()">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 text-blue-600">מסירה חוזית</label>
                    <input type="date" id="contractDelivery" oninput="updateAll()">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">מסירה בפועל (צפוי)</label>
                    <input type="date" id="actualDelivery" oninput="updateAll()">
                </div>
            </div>
            <div id="lawBadge" class="mt-4 text-center py-1 rounded-full text-[11px] font-bold"></div>
        </div>

        <div class="card shadow-sm">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold text-slate-800">לוח תשלומים והצמדות</h2>
                <button onclick="addCustomRow()" class="text-blue-600 text-xs font-bold hover:underline">+ הוסף תשלום מותאם</button>
            </div>
            <div class="hidden md:grid grid-cols-4 gap-2 text-[10px] font-bold text-slate-400 mb-2 uppercase">
                <div>תיאור שלב</div>
                <div>% מהמחיר</div>
                <div>תאריך תשלום</div>
                <div></div>
            </div>
            <div id="milestoneList" class="space-y-1"></div>
            <button onclick="resetMilestones()" class="mt-4 text-slate-400 text-[10px] underline">איפוס ללוח ברירת מחדל</button>
        </div>

        <div class="bg-slate-900 rounded-2xl p-6 text-white shadow-xl fixed bottom-4 left-4 right-4 max-w-2xl mx-auto z-50">
            <div class="grid grid-cols-1 gap-2 text-sm">
                <div class="flex justify-between border-b border-slate-800 pb-2">
                    <span class="opacity-70">פיצוי שכ"ד:</span>
                    <span id="resComp" class="font-semibold text-blue-300">₪0</span>
                </div>
                <div class="flex justify-between border-b border-slate-800 pb-2">
                    <span class="opacity-70">החזר 60% מדד:</span>
                    <span id="res60" class="font-semibold text-emerald-400">₪0</span>
                </div>
                <div class="flex justify-between border-b border-slate-800 pb-2">
                    <span class="opacity-70">החזר מדד איחור:</span>
                    <span id="resLate" class="font-semibold text-orange-400">₪0</span>
                </div>
                <div class="pt-2 flex justify-between items-center">
                    <span class="text-lg font-bold">סה"כ תביעה:</span>
                    <span id="resTotal" class="text-2xl font-black text-yellow-400">₪0</span>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-2 mt-4">
                <button onclick="shareWhatsApp()" class="bg-green-600 text-white font-bold py-2 rounded-lg text-sm">WhatsApp</button>
                <button onclick="clearStorage()" class="bg-slate-700 text-white font-bold py-2 rounded-lg text-sm">נקה הכל</button>
            </div>
        </div>
    </div>

    <script>
        const indexData = {
            "2021-01": 115.1, "2021-02": 115.2, "2021-03": 115.7, "2021-04": 116.6, "2021-05": 117.5, "2021-06": 118.0, "2021-07": 118.5, "2021-08": 119.1, "2021-09": 119.2, "2021-10": 119.5, "2021-11": 119.7, "2021-12": 119.8,
            "2022-01": 120.9, "2022-02": 121.4, "2022-03": 122.9, "2022-04": 124.4, "2022-05": 125.1, "2022-06": 126.0, "2022-07": 126.8, "2022-08": 127.4, "2022-09": 127.4, "2022-10": 127.8, "2022-11": 127.5, "2022-12": 127.5,
            "2023-01": 128.8, "2023-02": 129.2, "2023-03": 129.2, "2023-04": 129.6, "2023-05": 130.1, "2023-06": 130.5, "2023-07": 130.5, "2023-08": 131.0, "2023-09": 131.0, "2023-10": 131.3, "2023-11": 131.4, "2023-12": 131.5,
            "2024-01": 131.8, "2024-02": 132.0, "2024-03": 132.3, "2024-04": 133.0, "2024-05": 133.5, "2024-06": 133.6, "2024-07": 133.8, "2024-08": 134.1, "2024-09": 134.1, "2024-10": 134.2, "2024-11": 134.4, "2024-12": 134.6,
            "2025-01": 134.9, "2025-02": 135.2, "2025-03": 135.5, "2025-04": 136.0, "2025-05": 136.4, "2025-06": 136.6, "2025-07": 136.8, "2025-08": 137.0, "2025-09": 137.2, "2025-10": 137.4, "2025-11": 137.6, "2025-12": 137.8
        };

        const defaultMilestones = [
            { name: "מקדמה", pct: 0, fixed: 10000 },
            { name: "חתימת חוזה", pct: 7, fixed: -10000 },
            { name: "גמר יציקת רצפה", pct: 24 }, // 31% minus the 7% above
            { name: "גמר שלד קומה", pct: 25 },
            { name: "גמר שלד בניין", pct: 5 },
            { name: "גמר ציפוי חוץ", pct: 6 },
            { name: "גמר טיח וריצוף", pct: 10 },
            { name: "גמר חלונות ודלתות", pct: 13 },
            { name: "גמר מערכות ופיתוח", pct: 5 },
            { name: "אישור אכלוס (טופס 4)", pct: 5 }
        ];

        function init() {
            // Load from LocalStorage or use defaults
            const savedData = localStorage.getItem('neighborData');
            if (savedData) {
                const data = JSON.parse(savedData);
                document.getElementById('totalPrice').value = data.totalPrice;
                document.getElementById('rent').value = data.rent;
                document.getElementById('signDate').value = data.signDate;
                document.getElementById('contractDelivery').value = data.contractDelivery;
                document.getElementById('actualDelivery').value = data.actualDelivery;
                renderMilestones(data.milestones);
            } else {
                renderMilestones(defaultMilestones);
            }
            updateAll();
        }

        function renderMilestones(list) {
            const container = document.getElementById('milestoneList');
            container.innerHTML = '';
            list.forEach((m, i) => {
                const row = document.createElement('div');
                row.className = 'milestone-row';
                row.innerHTML = `
                    <input type="text" value="${m.name}" class="m-name font-bold text-slate-700 bg-transparent border-none">
                    <input type="number" value="${m.pct || 0}" class="m-pct text-center" oninput="updateAll()">
                    <input type="date" value="${m.date || ''}" class="m-date" oninput="updateAll()">
                    <button onclick="this.parentElement.remove();updateAll()" class="text-red-300 hover:text-red-600 text-xs text-left">✕</button>
                    <input type="hidden" class="m-fixed" value="${m.fixed || 0}">
                `;
                container.appendChild(row);
            });
        }

        function addCustomRow() {
            const container = document.getElementById('milestoneList');
            const row = document.createElement('div');
            row.className = 'milestone-row';
            row.innerHTML = `
                <input type="text" value="שלב חדש" class="m-name font-bold text-slate-700">
                <input type="number" value="0" class="m-pct text-center" oninput="updateAll()">
                <input type="date" class="m-date" oninput="updateAll()">
                <button onclick="this.parentElement.remove();updateAll()" class="text-red-300 hover:text-red-600 text-xs">✕</button>
                <input type="hidden" class="m-fixed" value="0">
            `;
            container.appendChild(row);
            updateAll();
        }

        function getIndex(date) {
            if (!date) return 0;
            const d = new Date(date);
            const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
            return indexData[key] || 137.8;
        }

        function updateAll() {
            const signDate = new Date(document.getElementById('signDate').value);
            const contractDeliv = new Date(document.getElementById('contractDelivery').value);
            const actualDeliv = new Date(document.getElementById('actualDelivery').value);
            const totalPrice = parseFloat(document.getElementById('totalPrice').value) || 0;
            const rent = parseFloat(document.getElementById('rent').value) || 0;
            const isNewLaw = signDate >= new Date('2022-07-07');

            const badge = document.getElementById('lawBadge');
            badge.innerText = isNewLaw ? "חוק חדש (תיקון 9)" : "חוק ישן (טרום יולי 2022)";
            badge.className = "mt-4 text-center py-1 rounded-full text-[11px] font-bold " + (isNewLaw ? "bg-emerald-100 text-emerald-700" : "bg-slate-200 text-slate-700");

            // 1. Rent Compensation
            let comp = 0;
            const diffDays = (actualDeliv - contractDeliv) / (1000 * 60 * 60 * 24);
            const mTotal = diffDays / 30.44;
            if (isNewLaw && diffDays > 30) {
                for (let m = 2; m <= mTotal + 1; m++) {
                    if (m <= 4) comp += rent; else if (m <= 10) comp += rent * 1.25; else comp += rent * 1.5;
                }
            } else if (!isNewLaw && diffDays > 60) {
                for (let m = 1; m <= mTotal; m++) {
                    if (m <= 8) comp += rent * 1.5; else comp += rent * 1.25;
                }
            }

            // 2. Linkage Auditing
            let global60 = 0, globalLate = 0;
            const baseIdx = getIndex(signDate);
            const contractDelivIdx = getIndex(contractDeliv);
            const currentMilestones = [];

            document.querySelectorAll('.milestone-row').forEach(row => {
                const name = row.querySelector('.m-name').value;
                const pct = parseFloat(row.querySelector('.m-pct').value) || 0;
                const date = row.querySelector('.m-date').value;
                const fixed = parseFloat(row.querySelector('.m-fixed').value) || 0;
                
                currentMilestones.push({ name, pct, date, fixed });

                if (date && baseIdx > 0) {
                    const mAmount = (totalPrice * pct / 100) + fixed;
                    const pIdx = getIndex(date);
                    const linkagePaid = mAmount * (pIdx / baseIdx - 1);

                    if (isNewLaw) {
                        if (new Date(date) <= contractDeliv) {
                            global60 += Math.max(0, linkagePaid * 0.6);
                        } else {
                            const linkageAtDeliv = mAmount * (contractDelivIdx / baseIdx - 1);
                            global60 += Math.max(0, linkageAtDeliv * 0.6);
                            globalLate += Math.max(0, linkagePaid - linkageAtDeliv);
                        }
                    } else if (new Date(date) > contractDeliv) {
                        const linkageAtDeliv = mAmount * (contractDelivIdx / baseIdx - 1);
                        globalLate += Math.max(0, linkagePaid - linkageAtDeliv);
                    }
                }
            });

            // Update UI
            document.getElementById('resComp').innerText = '₪' + Math.round(comp).toLocaleString();
            document.getElementById('res60').innerText = '₪' + Math.round(global60).toLocaleString();
            document.getElementById('resLate').innerText = '₪' + Math.round(globalLate).toLocaleString();
            document.getElementById('resTotal').innerText = '₪' + Math.round(comp + global60 + globalLate).toLocaleString();

            // Save to LocalStorage
            localStorage.setItem('neighborData', JSON.stringify({
                totalPrice, rent, signDate: document.getElementById('signDate').value,
                contractDelivery: document.getElementById('contractDelivery').value,
                actualDelivery: document.getElementById('actualDelivery').value,
                milestones: currentMilestones
            }));
        }

        function resetMilestones() { renderMilestones(defaultMilestones); updateAll(); }
        function clearStorage() { localStorage.removeItem('neighborData'); location.reload(); }
        function shareWhatsApp() {
            const msg = `*סיכום תביעת איחור במסירה*\n💰 פיצוי שכ"ד: ${document.getElementById('resComp').innerText}\n📉 החזר 60% מדד: ${document.getElementById('res60').innerText}\n🏗️ החזר מדד איחור: ${document.getElementById('resLate').innerText}\n*סה"כ דרישה: ${document.getElementById('resTotal').innerText}*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
        }

        init();
    </script>
</body>
</html>
