<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחשבון פיצוי והצמדה - חוק המכר</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #f8fafc; color: #1e293b; }
        
        /* נקיון שדות בתוך הטבלה */
        .clean-input { border: none !important; background: transparent !important; outline: none !important; box-shadow: none !important; padding: 4px 0 !important; }
        .date-input { border: 1px solid #cbd5e1 !important; border-radius: 8px; padding: 6px 10px !important; background: #fff !important; font-size: 14px; }
        
        /* שדות עליונים */
        .top-input { border: 1px solid #cbd5e1; border-radius: 10px; padding: 10px; width: 100%; background: #fff; }

        /* כרטיס תשלום */
        .milestone-card { border-bottom: 1px solid #e2e8f0; padding: 16px 0; position: relative; }
        .del-btn { color: #fca5a5; font-size: 22px; cursor: pointer; transition: color 0.2s; position: absolute; right: 0; top: 16px; }
        .del-btn:hover { color: #ef4444; }

        /* פאנל סיכום צף */
        .summary-panel { background: #0f172a; color: white; border-radius: 24px 24px 0 0; position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; box-shadow: 0 -10px 25px rgba(0,0,0,0.2); }
        
        /* הסרת חיצי מספרים */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body class="p-4 pb-72">
    <div class="max-w-2xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">מחשבון פיצוי דיירים</h1>
            <p class="text-slate-500 font-medium italic">בדיקת הצמדות ופיצוי איחור במסירה</p>
        </header>

        <!-- נתוני בסיס -->
        <div class="bg-white rounded-3xl shadow-sm p-6 mb-8 border border-slate-200">
            <div class="grid grid-cols-2 gap-4">
                <div class="col-span-2">
                    <label class="block text-xs font-bold text-slate-400 mb-1 mr-1">מחיר הדירה הכולל + מע"מ (₪)</label>
                    <input type="number" id="totalPrice" value="2500000" oninput="syncAllPrices()" class="text-2xl font-black border-b-2 border-slate-100 focus:border-blue-500 outline-none w-full py-2 tracking-tight">
                    <div class="text-[11px] text-slate-400 mt-1">לפני מע"מ: <span id="basePriceDisplay" class="font-bold text-slate-600">₪0</span></div>
                </div>
                <div class="col-span-2 sm:col-span-1">
                    <label class="block text-xs font-bold text-slate-400 mb-1 mr-1">שכירות חודשית (₪)</label>
                    <input type="number" id="rent" value="6500" oninput="updateAll()" class="top-input font-bold">
                </div>
                <div class="col-span-2 sm:col-span-1">
                    <label class="block text-xs font-bold text-slate-400 mb-1 mr-1">תאריך חתימת חוזה</label>
                    <input type="date" id="signDate" value="2022-08-01" onchange="updateAll()" class="top-input">
                </div>
                <div class="col-span-1">
                    <label class="block text-xs font-bold text-blue-500 mb-1 mr-1">מסירה חוזית</label>
                    <input type="date" id="contractDelivery" value="2024-01-01" onchange="updateAll()" class="top-input border-blue-200">
                </div>
                <div class="col-span-1">
                    <label class="block text-xs font-bold text-red-400 mb-1 mr-1">מסירה בפועל</label>
                    <input type="date" id="actualDelivery" value="2025-01-01" onchange="updateAll()" class="top-input border-red-100">
                </div>
            </div>
            <div id="lawBadge" class="mt-6 text-center py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-widest bg-slate-50 text-slate-400"></div>
        </div>

        <!-- לוח תשלומים -->
        <div class="flex justify-between items-center mb-4 px-2">
            <h2 class="text-xl font-bold text-slate-800">פירוט תשלומים</h2>
            <button onclick="addCustomRow()" class="text-blue-600 text-sm font-bold bg-blue-50 px-4 py-1.5 rounded-full hover:bg-blue-100 transition-all">+ הוסף תשלום</button>
        </div>
        
        <div id="milestoneList" class="bg-white rounded-3xl shadow-sm p-6 border border-slate-200 min-h-[100px]">
            <!-- Content Injected Here -->
        </div>

        <div class="text-center mt-8">
            <button onclick="resetMilestones()" class="text-slate-400 text-xs underline decoration-dotted opacity-60 hover:opacity-100">איפוס ללוח ברירת מחדל</button>
        </div>

        <!-- פאנל סיכום צף -->
        <div class="summary-panel">
            <div class="max-w-2xl mx-auto p-6">
                <div class="grid grid-cols-1 gap-2.5 text-sm">
                    <div class="flex justify-between items-center opacity-70">
                        <span>פיצוי שכ"ד:</span>
                        <span id="resComp" class="font-bold">₪0</span>
                    </div>
                    <div class="flex justify-between items-center text-emerald-400">
                        <span>החזר 60% (חוק חדש):</span>
                        <span id="res60Total" class="font-bold">₪0</span>
                    </div>
                    <div class="flex justify-between items-center text-orange-400">
                        <span>החזר הצמדה (איחור):</span>
                        <span id="resLateTotal" class="font-bold">₪0</span>
                    </div>
                    <div class="flex justify-between items-center text-3xl font-black text-yellow-400 pt-4 mt-2 border-t border-slate-800">
                        <span>סה"כ דרישה:</span>
                        <span id="resTotal">₪0</span>
                    </div>
                </div>
                <button onclick="shareWhatsApp()" class="w-full mt-6 bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-2xl transition-all shadow-xl flex items-center justify-center gap-2">
                    שתף סיכום ב-WhatsApp
                </button>
            </div>
        </div>
    </div>

    <script>
        // מדד מחירי תשומה בבנייה למגורים - בסיס 07/2011
        // Source: CBS via https://www.dekel.co.il | new base (07/2025) converted using coeff 138.7/100
        const indexData = {
            "2021-01": 115.8, "2021-02": 116.0, "2021-03": 116.6, "2021-04": 117.5, "2021-05": 118.3, "2021-06": 119.0, "2021-07": 119.3, "2021-08": 120.0, "2021-09": 120.3, "2021-10": 120.6, "2021-11": 121.2, "2021-12": 121.5,
            "2022-01": 122.5, "2022-02": 123.1, "2022-03": 124.3, "2022-04": 125.5, "2022-05": 126.1, "2022-06": 126.8, "2022-07": 127.4, "2022-08": 127.5, "2022-09": 127.5, "2022-10": 127.5, "2022-11": 127.3, "2022-12": 127.3,
            "2023-01": 128.8, "2023-02": 128.6, "2023-03": 128.9, "2023-04": 129.3, "2023-05": 129.2, "2023-06": 129.6, "2023-07": 129.3, "2023-08": 129.4, "2023-09": 129.5, "2023-10": 129.7, "2023-11": 129.8, "2023-12": 129.8,
            "2024-01": 130.2, "2024-02": 129.9, "2024-03": 130.2, "2024-04": 130.1, "2024-05": 130.7, "2024-06": 131.2, "2024-07": 131.7, "2024-08": 132.0, "2024-09": 132.5, "2024-10": 132.8, "2024-11": 133.2, "2024-12": 133.6,
            "2025-01": 137.1, "2025-02": 137.7, "2025-03": 138.2, "2025-04": 138.4, "2025-05": 138.6, "2025-06": 138.6, "2025-07": 138.7, "2025-08": 139.3, "2025-09": 139.3, "2025-10": 139.4, "2025-11": 140.2, "2025-12": 140.4,
            "2026-01": 140.5, "2026-02": 140.8, "2026-03": 141.1, "2026-04": 142.6, "2026-05": 143.4, "2026-06": 143.7
        };

        // VAT rates by date range
        function getVatRate(dateStr) {
            if (!dateStr) return 0.17;
            if (dateStr >= '2025-01-01') return 0.18;
            return 0.17;
        }

        const defaultMilestones = [
            { name: "מקדמה", pct: 0, amt: 10000 },
            { name: "חתימת חוזה", pct: 7, amt: 0, deduct: 10000 },
            { name: "גמר יציקת רצפה", pct: 24, amt: 0 },
            { name: "גמר שלד קומה", pct: 25, amt: 0 },
            { name: "גמר שלד בניין", pct: 5, amt: 0 },
            { name: "גמר ציפוי חוץ", pct: 6, amt: 0 },
            { name: "גמר טיח וריצוף", pct: 10, amt: 0 },
            { name: "גמר חלונות ודלתות", pct: 13, amt: 0 },
            { name: "גמר מערכות ופיתוח", pct: 5, amt: 0 },
            { name: "אישור אכלוס", pct: 5, amt: 0 }
        ];

        function init() {
            const saved = localStorage.getItem('neighborData_v5');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('totalPrice').value = data.totalPrice;
                document.getElementById('rent').value = data.rent;
                document.getElementById('signDate').value = data.signDate;
                document.getElementById('contractDelivery').value = data.contractDelivery;
                document.getElementById('actualDelivery').value = data.actualDelivery;
                renderMilestones(data.milestones);
            } else {
                resetMilestones();
            }
            updateAll();
        }

        function renderMilestones(list) {
            const container = document.getElementById('milestoneList');
            container.innerHTML = '';
            list.forEach(m => addRowUI(m));
        }

        function addRowUI(data) {
            const container = document.getElementById('milestoneList');
            const card = document.createElement('div');
            card.className = 'milestone-card';
            card.innerHTML = `
                <button class="del-btn" onclick="this.closest('.milestone-card').remove();updateAll()">✕</button>
                <div class="flex items-center gap-3 mb-2 pr-8">
                    <div class="flex-grow flex items-center justify-between">
                        <input type="text" value="${data.name}" class="m-name clean-input font-bold text-slate-700 flex-grow text-sm">
                        <input type="date" value="${data.date || ''}" class="m-date date-input text-xs" onchange="updateAll()">
                    </div>
                </div>
                <div class="flex items-center gap-6 mt-1 pr-8">
                    <div class="flex items-center gap-0.5">
                        <span class="text-[10px] text-slate-300 font-bold ml-1">%</span>
                        <input type="number" value="${data.pct}" class="m-pct clean-input font-bold text-slate-400 w-12 text-center" oninput="syncFromPct(this)">
                    </div>
                    <div class="flex items-center gap-1 flex-grow">
                        <span class="text-[10px] text-slate-300 font-bold ml-1">₪</span>
                        <input type="number" value="${data.amt}" class="m-amt clean-input font-bold text-slate-800 w-full" oninput="syncFromAmt(this)">
                        <span class="text-[9px] text-slate-300 whitespace-nowrap">ללא מע"מ</span>
                    </div>
                </div>
                <div class="mt-4 flex justify-between items-center text-[10px] pr-8 border-t border-slate-50 pt-2">
                    <div class="flex gap-3">
                        <div class="text-purple-500">מע"מ: <span class="m-vat font-bold">₪0</span></div>
                        <div class="text-slate-400 italic">הצמדה: <span class="m-link-paid font-bold text-slate-600">₪0</span></div>
                    </div>
                    <div class="flex gap-4">
                        <div class="text-emerald-600 font-bold">החזר 60%: <span class="m-ref60">₪0</span></div>
                        <div class="text-orange-500 font-bold">החזר איחור: <span class="m-refLate">₪0</span></div>
                    </div>
                </div>
            `;
            container.appendChild(card);
            if (data.fixed) card.setAttribute('data-fixed', '1');
        }

        // Get base price (without VAT) using VAT rate at sign date
        function getBasePrice() {
            const totalPrice = parseFloat(document.getElementById('totalPrice').value) || 0;
            const signDateVal = document.getElementById('signDate').value;
            const vatRate = getVatRate(signDateVal);
            return totalPrice / (1 + vatRate);
        }

        function syncFromPct(el) {
            const basePrice = getBasePrice();
            const card = el.closest('.milestone-card');
            const amtInput = card.querySelector('.m-amt');
            if (amtInput) {
                amtInput.value = Math.round(basePrice * (parseFloat(el.value) || 0) / 100);
            }
            card.removeAttribute('data-fixed');
            updateAll();
        }

        function syncFromAmt(el) {
            const basePrice = getBasePrice();
            const card = el.closest('.milestone-card');
            const pctInput = card.querySelector('.m-pct');
            if (basePrice > 0 && pctInput) {
                pctInput.value = ((parseFloat(el.value) || 0) / basePrice * 100).toFixed(2);
            }
            card.setAttribute('data-fixed', '1');
            updateAll();
        }

        function syncAllPrices() {
            const basePrice = getBasePrice();
            document.querySelectorAll('.milestone-card').forEach(card => {
                if (card.hasAttribute('data-fixed')) return;
                const pctInput = card.querySelector('.m-pct');
                const amtInput = card.querySelector('.m-amt');
                if (pctInput && amtInput) {
                    const pct = parseFloat(pctInput.value) || 0;
                    if (pct > 0) {
                        amtInput.value = Math.round(basePrice * pct / 100);
                    }
                }
            });
            updateAll();
        }

        function addCustomRow() {
            addRowUI({ name: "תשלום מותאם", pct: 0, amt: 0 });
            updateAll();
        }

        function getIndex(dateStr) {
            if (!dateStr) return 0;
            const parts = dateStr.split('-');
            const key = `${parts[0]}-${parts[1]}`;
            if (indexData[key]) return indexData[key];
            const keys = Object.keys(indexData).sort();
            if (key < keys[0]) return indexData[keys[0]];
            if (key > keys[keys.length - 1]) {
                // Extrapolate: compute 12-month growth rate from last known data
                const lastKey = keys[keys.length - 1];
                const lastVal = indexData[lastKey];
                // Find the value 12 months before the last key
                const [ly, lm] = lastKey.split('-').map(Number);
                const prevYear = ly - 1;
                const prevKey = `${prevYear}-${String(lm).padStart(2, '0')}`;
                const prevVal = indexData[prevKey];
                if (!prevVal) return lastVal;
                const annualRate = lastVal / prevVal;
                // Calculate months forward from last known
                const [ty, tm] = key.split('-').map(Number);
                const monthsForward = (ty - ly) * 12 + (tm - lm);
                return lastVal * Math.pow(annualRate, monthsForward / 12);
            }
            return 0;
        }

        function updateAll() {
            const totalPrice = parseFloat(document.getElementById('totalPrice').value) || 0;
            const rent = parseFloat(document.getElementById('rent').value) || 0;
            const signDateVal = document.getElementById('signDate').value;
            const contractDelivVal = document.getElementById('contractDelivery').value;
            const actualDelivVal = document.getElementById('actualDelivery').value;

            // Display base price
            const basePrice = getBasePrice();
            document.getElementById('basePriceDisplay').innerText = '₪' + Math.round(basePrice).toLocaleString();
            
            const isNewLaw = signDateVal && new Date(signDateVal) >= new Date('2022-07-07');
            const badge = document.getElementById('lawBadge');
            badge.innerText = isNewLaw ? "חוק המכר החדש (תיקון 9)" : "חוק המכר הישן";
            badge.className = `mt-6 text-center py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-widest ${isNewLaw ? 'bg-emerald-50 text-emerald-600' : 'bg-slate-50 text-slate-400'}`;

            // Compensation
            let comp = 0;
            if (contractDelivVal && actualDelivVal) {
                const diffDays = (new Date(actualDelivVal) - new Date(contractDelivVal)) / (1000 * 60 * 60 * 24);
                const mTotal = diffDays / 30.44;
                if (isNewLaw && diffDays > 30) {
                    for (let m = 2; m <= mTotal + 1; m++) {
                        if (m <= 4) comp += rent; else if (m <= 10) comp += rent * 1.25; else comp += rent * 1.5;
                    }
                } else if (!isNewLaw && diffDays > 60) {
                    for (let m = 1; m <= mTotal; m++) {
                        if (m <= 8) comp += rent * 1.5; else comp += rent * 1.25;
                    }
                }
            }

            // Linkage calculation
            let sum60 = 0, sumLate = 0;
            const baseIdx = getIndex(signDateVal);
            const delivIdx = getIndex(contractDelivVal);
            const listToSave = [];

            document.querySelectorAll('.milestone-card').forEach(card => {
                const nameInput = card.querySelector('.m-name');
                const pctInput = card.querySelector('.m-pct');
                const amtInput = card.querySelector('.m-amt');
                const dateInput = card.querySelector('.m-date');

                if (!nameInput || !pctInput || !amtInput || !dateInput) return;

                const preVatAmt = parseFloat(amtInput.value) || 0;
                const pDate = dateInput.value;
                const pIdx = getIndex(pDate);

                // Compute VAT for this payment based on payment date
                const vatRate = getVatRate(pDate);
                const vatAmt = preVatAmt * vatRate;
                const fullAmt = preVatAmt + vatAmt;

                listToSave.push({
                    name: nameInput.value,
                    pct: pctInput.value,
                    amt: preVatAmt,
                    date: pDate,
                    fixed: card.hasAttribute('data-fixed') ? 1 : 0
                });

                const vatEl = card.querySelector('.m-vat');
                const linkPaidEl = card.querySelector('.m-link-paid');
                const ref60El = card.querySelector('.m-ref60');
                const refLateEl = card.querySelector('.m-refLate');

                // Display VAT
                if (vatEl) vatEl.innerText = preVatAmt > 0 && pDate ? '₪' + Math.round(vatAmt).toLocaleString() : '₪0';

                if (fullAmt > 0 && baseIdx > 0 && pIdx > 0) {
                    const totalLinkage = fullAmt * (pIdx / baseIdx - 1);
                    if (linkPaidEl) linkPaidEl.innerText = '₪' + Math.max(0, Math.round(totalLinkage)).toLocaleString();

                    let r60 = 0, rLate = 0;
                    if (isNewLaw) {
                        if (new Date(pDate) <= new Date(contractDelivVal)) {
                            r60 = totalLinkage * 0.6;
                        } else {
                            const linkAtDeliv = fullAmt * (delivIdx / baseIdx - 1);
                            r60 = linkAtDeliv * 0.6;
                            rLate = totalLinkage - linkAtDeliv;
                        }
                    } else if (new Date(pDate) > new Date(contractDelivVal)) {
                        const linkAtDeliv = fullAmt * (delivIdx / baseIdx - 1);
                        rLate = totalLinkage - linkAtDeliv;
                    }

                    if (ref60El) ref60El.innerText = '₪' + Math.max(0, Math.round(r60)).toLocaleString();
                    if (refLateEl) refLateEl.innerText = '₪' + Math.max(0, Math.round(rLate)).toLocaleString();
                    sum60 += Math.max(0, r60);
                    sumLate += Math.max(0, rLate);
                } else {
                    if (linkPaidEl) linkPaidEl.innerText = '₪0';
                    if (ref60El) ref60El.innerText = '₪0';
                    if (refLateEl) refLateEl.innerText = '₪0';
                }
            });

            document.getElementById('resComp').innerText = '₪' + Math.round(comp).toLocaleString();
            document.getElementById('res60Total').innerText = '₪' + Math.round(sum60).toLocaleString();
            document.getElementById('resLateTotal').innerText = '₪' + Math.round(sumLate).toLocaleString();
            document.getElementById('resTotal').innerText = '₪' + Math.round(comp + sum60 + sumLate).toLocaleString();

            localStorage.setItem('neighborData_v5', JSON.stringify({
                totalPrice, rent, signDate: signDateVal, contractDelivery: contractDelivVal, actualDelivery: actualDelivVal, milestones: listToSave
            }));
        }

        function resetMilestones() {
            const basePrice = getBasePrice();
            const list = defaultMilestones.map(m => {
                let calculatedAmt = m.amt;
                if (m.deduct) calculatedAmt = (basePrice * m.pct / 100) - m.deduct;
                else if (m.pct > 0) calculatedAmt = basePrice * m.pct / 100;
                return { ...m, amt: Math.round(calculatedAmt) };
            });
            renderMilestones(list);
            updateAll();
        }

        function shareWhatsApp() {
            const res = `*סיכום תביעת איחור במסירה*\n🏘️ פיצוי שכ"ד: ${document.getElementById('resComp').innerText}\n📉 החזר 60% מדד: ${document.getElementById('res60Total').innerText}\n🏗️ החזר מדד איחור: ${document.getElementById('resLateTotal').innerText}\n*סה"כ דרישה: ${document.getElementById('resTotal').innerText}*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(res)}`);
        }

        init();
    </script>
</body>
</html>
