<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחשבון פיצוי חוק המכר</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #f8fafc; }
        .milestone-card { border-right: 4px solid #3b82f6; }
    </style>
</head>
<body class="p-4 bg-slate-50">
    <div class="max-w-2xl mx-auto">
        <header class="text-center mb-6">
            <h1 class="text-2xl font-bold text-slate-800">מחשבון פיצוי והחזרי הצמדה</h1>
            <p class="text-slate-500 text-sm italic">חישוב לפי תיקון 9 (יולי 2022) ומדדי תשומות הבנייה</p>
        </header>

        <div class="bg-white rounded-xl shadow-sm p-6 mb-6 border border-slate-200">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="col-span-2 md:col-span-1">
                    <label class="block text-sm font-semibold mb-1">מחיר הדירה (₪)</label>
                    <input type="number" id="totalPrice" value="2500000" oninput="updateAll()" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="col-span-2 md:col-span-1">
                    <label class="block text-sm font-semibold mb-1">שכירות חודשית מוערכת (₪)</label>
                    <input type="number" id="rent" value="6500" oninput="updateAll()" class="w-full p-2 border rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1 text-xs">חתימת חוזה</label>
                    <input type="date" id="signDate" value="2022-08-01" oninput="updateAll()" class="w-full p-2 border rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1 text-xs text-blue-600">מועד מסירה חוזי</label>
                    <input type="date" id="contractDelivery" value="2024-01-01" oninput="updateAll()" class="w-full p-2 border rounded-lg border-blue-200">
                </div>
                <div class="col-span-2">
                    <label class="block text-sm font-semibold mb-1">תאריך מסירה צפוי</label>
                    <input type="date" id="actualDelivery" value="2025-01-01" oninput="updateAll()" class="w-full p-2 border rounded-lg">
                </div>
            </div>
            <div id="lawBadge" class="mt-4 text-center py-1 rounded-full text-[11px] font-bold"></div>
        </div>

        <div class="bg-white rounded-xl shadow-sm p-6 mb-6 border border-slate-200">
            <h2 class="font-bold text-lg mb-4 text-slate-800 border-b pb-2">תשלומים לפי שלבים</h2>
            <div id="milestonesContainer" class="space-y-4">
                </div>
        </div>

        <div class="bg-slate-900 rounded-2xl p-6 text-white shadow-xl sticky bottom-4">
            <div class="grid grid-cols-1 gap-2 text-sm">
                <div class="flex justify-between border-b border-slate-800 pb-2">
                    <span class="opacity-70">פיצוי איחור (שכ"ד):</span>
                    <span id="resComp" class="font-semibold text-blue-300">₪0</span>
                </div>
                <div class="flex justify-between border-b border-slate-800 pb-2">
                    <span class="opacity-70">החזר 60% הצמדה (חוק חדש):</span>
                    <span id="res60" class="font-semibold text-emerald-400">₪0</span>
                </div>
                <div class="flex justify-between border-b border-slate-800 pb-2">
                    <span class="opacity-70">החזר הצמדה עודפת (איחור):</span>
                    <span id="resLate" class="font-semibold text-orange-400">₪0</span>
                </div>
                <div class="pt-3 flex justify-between items-center">
                    <span class="text-lg font-bold">סה"כ תביעה:</span>
                    <span id="resTotal" class="text-2xl font-black text-yellow-400">₪0</span>
                </div>
            </div>
            <button onclick="shareWhatsApp()" class="w-full mt-4 bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2">
                <span>שלח סיכום בוואטסאפ</span>
            </button>
        </div>
    </div>

    <script>
        const indexData = {
            "2021-01": 115.1, "2021-02": 115.2, "2021-03": 115.7, "2021-04": 116.6, "2021-05": 117.5, "2021-06": 118.0, "2021-07": 118.5, "2021-08": 119.1, "2021-09": 119.2, "2021-10": 119.5, "2021-11": 119.7, "2021-12": 119.8,
            "2022-01": 120.9, "2022-02": 121.4, "2022-03": 122.9, "2022-04": 124.4, "2022-05": 125.1, "2022-06": 126.0, "2022-07": 126.8, "2022-08": 127.4, "2022-09": 127.4, "2022-10": 127.8, "2022-11": 127.5, "2022-12": 127.5,
            "2023-01": 128.8, "2023-02": 129.2, "2023-03": 129.2, "2023-04": 129.6, "2023-05": 130.1, "2023-06": 130.5, "2023-07": 130.5, "2023-08": 131.0, "2023-09": 131.0, "2023-10": 131.3, "2023-11": 131.4, "2023-12": 131.5,
            "2024-01": 131.8, "2024-02": 132.0, "2024-03": 132.3, "2024-04": 133.0, "2024-05": 133.5, "2024-06": 133.6, "2024-07": 133.8, "2024-08": 134.1, "2024-09": 134.1, "2024-10": 134.2, "2024-11": 134.4, "2024-12": 134.6,
            "2025-01": 134.9, "2025-02": 135.2, "2025-03": 135.5, "2025-04": 136.0, "2025-05": 136.4, "2025-06": 136.6, "2025-07": 136.8, "2025-08": 137.0, "2025-09": 137.2, "2025-10": 137.4, "2025-11": 137.6, "2025-12": 137.8
        };

        const milestones = [
            { id: 1, name: "גמר יציקת רצפת מפלס תחתון", pct: 31 },
            { id: 2, name: "גמר שלד קומה (דירה ומטה)", pct: 25 },
            { id: 3, name: "גמר שלד בכל הבניין", pct: 5 },
            { id: 4, name: "גמר ציפוי חוץ", pct: 6 },
            { id: 5, name: "גמר טיח וריצוף בדירה", pct: 10 },
            { id: 6, name: "גמר חלונות ודלתות", pct: 13 },
            { id: 7, name: "גמר מערכות ופיתוח חצר", pct: 5 },
            { id: 8, name: "אישור אכלוס (טופס 4)", pct: 5 }
        ];

        function init() {
            const container = document.getElementById('milestonesContainer');
            milestones.forEach(m => {
                const div = document.createElement('div');
                div.className = 'milestone-card bg-slate-50 p-4 rounded-lg border border-slate-100 shadow-sm';
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <div class="w-1/2">
                            <span class="text-[9px] bg-blue-600 text-white px-2 py-0.5 rounded-full font-bold uppercase tracking-wider">${m.pct}% מהמחיר</span>
                            <h3 class="text-[13px] font-bold text-slate-800 mt-1">${m.name}</h3>
                        </div>
                        <div class="text-left">
                            <label class="text-[10px] text-slate-400 block uppercase">תאריך תשלום</label>
                            <input type="date" class="m-date w-32 p-1 text-xs border rounded bg-white" data-id="${m.id}" oninput="updateAll()">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 border-t border-slate-200 pt-2 text-[11px]">
                        <div>
                            <p class="text-slate-400">סכום השלב: <span id="amt-${m.id}" class="text-slate-900 font-bold">₪0</span></p>
                            <p class="text-slate-400">הצמדה ששולמה: <span id="link-${m.id}" class="text-slate-700">₪0</span></p>
                        </div>
                        <div class="text-left bg-white p-1 rounded border border-blue-50">
                            <p class="text-emerald-600 font-medium">החזר 60%: <span id="ref60-${m.id}">₪0</span></p>
                            <p class="text-orange-600 font-medium">החזר איחור: <span id="refLate-${m.id}">₪0</span></p>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
            updateAll();
        }

        function getIndex(date) {
            if (!date) return 0;
            const d = new Date(date);
            const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
            return indexData[key] || 137.8;
        }

        function updateAll() {
            const signDate = new Date(document.getElementById('signDate').value);
            const contractDeliv = new Date(document.getElementById('contractDelivery').value);
            const actualDeliv = new Date(document.getElementById('actualDelivery').value);
            const totalPrice = parseFloat(document.getElementById('totalPrice').value) || 0;
            const rent = parseFloat(document.getElementById('rent').value) || 0;
            const isNewLaw = signDate >= new Date('2022-07-07');

            document.getElementById('lawBadge').innerText = isNewLaw ? "חוק המכר החדש (תיקון 9) - הגבלת הצמדה ל-40%" : "חוק המכר הישן - אין הגבלת 60%";
            document.getElementById('lawBadge').className = "mt-4 text-center py-1 rounded-full text-[11px] font-bold " + (isNewLaw ? "bg-emerald-100 text-emerald-700" : "bg-slate-200 text-slate-700");

            // 1. פיצוי שכ"ד (תיקון 9)
            let comp = 0;
            const diffDays = (actualDeliv - contractDeliv) / (1000 * 60 * 60 * 24);
            if (isNewLaw && diffDays > 30) {
                const mTotal = diffDays / 30.44;
                for (let m = 2; m <= mTotal + 1; m++) {
                    if (m <= 4) comp += rent;
                    else if (m <= 10) comp += rent * 1.25;
                    else comp += rent * 1.5;
                }
            } else if (!isNewLaw && diffDays > 60) {
                const mTotal = diffDays / 30.44;
                for (let m = 1; m <= mTotal; m++) {
                    if (m <= 8) comp += rent * 1.5;
                    else comp += rent * 1.25;
                }
            }

            // 2. חישוב הצמדות והחזרים לכל שלב
            let globalRef60 = 0;
            let globalRefLate = 0;
            const baseIdx = getIndex(signDate);
            const contractDelivIdx = getIndex(contractDeliv);

            document.querySelectorAll('.m-date').forEach(input => {
                const mId = input.dataset.id;
                const mDate = new Date(input.value);
                const pct = milestones.find(m => m.id == mId).pct;
                const mPrice = (totalPrice * pct) / 100;
                const currentIdx = getIndex(input.value);

                document.getElementById(`amt-${mId}`).innerText = '₪' + Math.round(mPrice).toLocaleString();

                if (input.value && baseIdx > 0) {
                    const linkagePaid = mPrice * (currentIdx / baseIdx - 1);
                    let r60 = 0;
                    let rLate = 0;
                    
                    if (isNewLaw) {
                        if (mDate <= contractDeliv) {
                            // Normal payment: Just return the 60% excess
                            r60 = Math.max(0, linkagePaid * 0.6);
                        } else {
                            // Late payment: 
                            // 1. Return 60% of the "legal" linkage (up to delivery date)
                            const linkageAtDelivery = mPrice * (contractDelivIdx / baseIdx - 1);
                            r60 = Math.max(0, linkageAtDelivery * 0.6);
                            
                            // 2. Return 100% of the "illegal" linkage (post delivery date)
                            rLate = Math.max(0, linkagePaid - linkageAtDelivery);
                        }
                    } else {
                        // Old Law: Only return the late index difference
                        if (mDate > contractDeliv) {
                            const linkageAtDelivery = mPrice * (contractDelivIdx / baseIdx - 1);
                            rLate = Math.max(0, linkagePaid - linkageAtDelivery);
                        }
                    }

                    document.getElementById(`ref60-${mId}`).innerText = '₪' + Math.round(r60).toLocaleString();
                    document.getElementById(`refLate-${mId}`).innerText = '₪' + Math.round(rLate).toLocaleString();
                    
                    globalRef60 += r60;
                    globalRefLate += rLate;
                }
            });

            document.getElementById('resComp').innerText = '₪' + Math.round(comp).toLocaleString();
            document.getElementById('res60').innerText = '₪' + Math.round(globalRef60).toLocaleString();
            document.getElementById('resLate').innerText = '₪' + Math.round(globalRefLate).toLocaleString();
            document.getElementById('resTotal').innerText = '₪' + Math.round(comp + globalRef60 + globalRefLate).toLocaleString();
        }

        function shareWhatsApp() {
            const res = `*סיכום תביעת איחור במסירה*\n` +
                        `🏠 פיצוי שכ"ד: ${document.getElementById('resComp').innerText}\n` +
                        `📉 החזר 60% מדד: ${document.getElementById('res60').innerText}\n` +
                        `🏗️ החזר הצמדה (איחור): ${document.getElementById('resLate').innerText}\n` +
                        `*סה"כ דרישה: ${document.getElementById('resTotal').innerText}*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(res)}`);
        }
        init();
    </script>
</body>
</html>
